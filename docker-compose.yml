version: '3.8'
services:
  mysql_db:
    image: mysql:8.0
    container_name: juxa_mysql_local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: legal_advice_db
      MYSQL_USER: juxa_user
      MYSQL_PASSWORD: juxa_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: